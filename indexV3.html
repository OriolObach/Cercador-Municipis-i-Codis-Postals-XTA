<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTA · Barra cobertura CP</title>
<style>
:root {
  --yellow:#ffcc00;
  --dark:#2f2f2f;
  --green:#52a449;
  --error:#b00020;
  --ok:#1f7a35;
}
* { box-sizing:border-box; }
html,body {
  margin:0;
  min-height:100%;
  font-family:Arial, Helvetica, sans-serif;
  color:#222;
  background:#fff;
}
.top-line { height:6px; background:#3f3f3f; }
.header {
  height:136px;
  padding:28px 44px 22px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:28px;
  background:#fff;
  border-bottom:2px solid var(--green);
}
.logo { width:270px; max-width:30vw; height:auto; display:block; }
.nav {
  display:flex;
  gap:30px;
  align-items:center;
  font-size:21px;
  font-weight:700;
  color:#444;
  white-space:nowrap;
}
.phone {
  text-align:center;
  font-size:20px;
  line-height:1.1;
  font-weight:700;
  white-space:nowrap;
}
.call {
  background:var(--yellow);
  border-radius:999px;
  padding:16px 24px;
  font-size:20px;
  font-weight:800;
  white-space:nowrap;
}
.main-white {
  min-height:calc(100vh - 136px - 290px);
  background:#fff;
}
.form-zone {
  background:var(--yellow);
  padding:34px 38px 28px;
}
.form-grid {
  max-width:1920px;
  margin:0 auto;
  display:grid;
  grid-template-columns:1.05fr 1.05fr 1fr 1.18fr 180px;
  gap:28px;
  align-items:end;
}
.field label {
  display:block;
  margin-bottom:12px;
  font-size:21px;
  font-weight:800;
}
.input-wrap { position:relative; }
.input-wrap .ico {
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
  font-size:24px;
  color:#333;
  z-index:1;
}
input,select {
  width:100%;
  height:72px;
  border:0;
  border-radius:9px;
  background:#fff;
  padding:0 18px 0 58px;
  font-size:20px;
  color:#333;
  box-shadow:0 1px 4px rgba(0,0,0,.10);
}
select { padding-left:54px; }
input:focus,select:focus { outline:3px solid rgba(47,47,47,.20); }
input.invalid,select.invalid { outline:3px solid rgba(176,0,32,.28); }
input.valid,select.valid { outline:3px solid rgba(31,122,53,.26); }
.submit {
  height:72px;
  border:0;
  border-radius:9px;
  background:#2f2f2f;
  color:#fff;
  font-size:22px;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 2px 7px rgba(0,0,0,.20);
}
.submit.disabled {
  background:#9a9a9a;
  color:#e7e7e7;
  cursor:not-allowed;
  box-shadow:none;
}
.message {
  max-width:1320px;
  margin:24px auto 0;
  text-align:center;
  font-size:20px;
  font-weight:700;
  color:#222;
}
.message.error { color:var(--error); }
.message.ok { color:var(--ok); }

.success-overlay {
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.94);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99999;
}
.success-card {
  background:#fff;
  border-radius:18px;
  padding:46px 58px;
  text-align:center;
  box-shadow:0 14px 45px rgba(0,0,0,.22);
  border-top:10px solid var(--yellow);
  max-width:560px;
}
.success-icon {
  width:78px;
  height:78px;
  border-radius:50%;
  background:#1f7a35;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:46px;
  font-weight:800;
  margin:0 auto 20px;
}
.success-card h2 { margin:0 0 12px; font-size:34px; }
.success-card p { margin:0; font-size:18px; color:#555; }

@media(max-width:1400px) {
  .nav { gap:18px; font-size:18px; }
  .logo { width:220px; }
}
@media(max-width:1180px) {
  .nav { display:none; }
  .form-grid { grid-template-columns:1fr 1fr; }
  .submit { grid-column:1/-1; }
}
@media(max-width:720px) {
  .header { height:auto; padding:22px; }
  .logo { width:220px; max-width:70vw; }
  .phone,.call { display:none; }
  .main-white { min-height:36vh; }
  .form-zone { padding:26px 18px; }
  .form-grid { grid-template-columns:1fr; gap:18px; }
}
</style>
</head>

const nom = document.getElementById("nom");
const telefon = document.getElementById("telefon");
const cp = document.getElementById("cp");
const municipi = document.getElementById("municipi");
const enviar = document.getElementById("enviar");
const missatge = document.getElementById("missatge");
const successOverlay = document.getElementById("successOverlay");

function nomValid(valor) {
  return valor.trim().length >= 2;
}

function telefonValid(valor) {
  let digits = valor.replace(/\D/g, "");
  if (digits.startsWith("34") && digits.length === 11) {
    digits = digits.slice(2);
  }
  return digits.length === 9 && /^[6789]/.test(digits);
}

function cpExisteix(valor) {
  return /^\d{5}$/.test(valor) && !!dadesCP[valor];
}

function resetMunicipi(text = "S’obtindrà automàticament") {
  municipi.innerHTML = "";
  const op = document.createElement("option");
  op.value = "";
  op.textContent = text;
  municipi.appendChild(op);
  municipi.disabled = true;
  municipi.classList.remove("valid","invalid");
}

function actualitzarMunicipi() {
  const valorCP = cp.value.replace(/\D/g, "").slice(0,5);
  cp.value = valorCP;

  if (!valorCP) {
    resetMunicipi();
    return;
  }

  if (valorCP.length < 5) {
    resetMunicipi("Escriu els 5 dígits");
    return;
  }

  const llista = dadesCP[valorCP];

  if (!llista) {
    resetMunicipi("CP no trobat");
    municipi.classList.add("invalid");
    return;
  }

  municipi.innerHTML = "";

  if (llista.length === 1) {
    const op = document.createElement("option");
    op.value = llista[0];
    op.textContent = llista[0];
    municipi.appendChild(op);
    municipi.disabled = true;
    municipi.classList.add("valid");
  } else {
    const ph = document.createElement("option");
    ph.value = "";
    ph.textContent = "Selecciona municipi...";
    ph.selected = true;
    ph.disabled = true;
    municipi.appendChild(ph);

    llista.forEach(m => {
      const op = document.createElement("option");
      op.value = m;
      op.textContent = m;
      municipi.appendChild(op);
    });

    municipi.disabled = false;
    municipi.classList.add("invalid");
  }
}

function obtenirErrors() {
  const errors = [];
  const okCP = cpExisteix(cp.value);

  if (!nomValid(nom.value)) {
    errors.push("falta el nom");
  }

  if (!telefonValid(telefon.value)) {
    errors.push("el telèfon no és vàlid");
  }

  if (cp.value.trim().length === 0) {
    errors.push("falta el codi postal");
  } else if (cp.value.trim().length < 5) {
    errors.push("el codi postal ha de tenir 5 dígits");
  } else if (!okCP) {
    errors.push("el codi postal no consta a la base");
  }

  if (okCP && !municipi.value) {
    errors.push("has de seleccionar el municipi");
  }

  return errors;
}

function validar() {
  const okNom = nomValid(nom.value);
  const okTel = telefonValid(telefon.value);
  const okCP = cpExisteix(cp.value);
  const okMunicipi = !!municipi.value;

  nom.classList.toggle("valid", okNom);
  nom.classList.toggle("invalid", nom.value.length > 0 && !okNom);

  telefon.classList.toggle("valid", okTel);
  telefon.classList.toggle("invalid", telefon.value.length > 0 && !okTel);

  cp.classList.toggle("valid", okCP);
  cp.classList.toggle("invalid", cp.value.length === 5 && !okCP);

  municipi.classList.toggle("valid", okMunicipi);
  municipi.classList.toggle("invalid", okCP && !okMunicipi);

  const errors = obtenirErrors();

  if (errors.length === 0) {
    missatge.textContent = "Dades validades. Ja pots enviar.";
    missatge.className = "message ok";
    enviar.classList.remove("disabled");
  } else {
    missatge.textContent = "No es pot enviar: " + errors.join(", ") + ".";
    missatge.className = "message error";
    enviar.classList.add("disabled");
  }

  return errors.length === 0;
}

function posarAZero() {
  nom.value = "";
  telefon.value = "";
  cp.value = "";
  resetMunicipi();
  [nom, telefon, cp, municipi].forEach(el => el.classList.remove("valid","invalid"));
  enviar.classList.add("disabled");
  missatge.textContent = "Introdueix el nom, el telèfon i el codi postal.";
  missatge.className = "message";
}

function enviarFormulari() {
  const municipiSeleccionat = municipi.value;

  actualitzarMunicipi();

  if (municipiSeleccionat) {
    for (let i = 0; i < municipi.options.length; i++) {
      if (municipi.options[i].value === municipiSeleccionat) {
        municipi.selectedIndex = i;
        break;
      }
    }
  }

  const correcte = validar();

  if (!correcte) {
    return;
  }

  successOverlay.style.display = "flex";

  setTimeout(() => {
    successOverlay.style.display = "none";
    posarAZero();
  }, 3000);
}

[nom, telefon, cp, municipi].forEach(el => {
  el.addEventListener("input", () => {
    if (el === cp) actualitzarMunicipi();
    validar();
  });
  el.addEventListener("change", () => {
    validar();
  });
  el.addEventListener("keyup", () => {
    if (el === cp) actualitzarMunicipi();
    validar();
  });
});

enviar.addEventListener("click", enviarFormulari);

resetMunicipi();
validar();
</script>
</body>
</html>
